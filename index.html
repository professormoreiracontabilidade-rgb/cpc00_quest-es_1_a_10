<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFC na Palma da Mão - CPC 00</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#071b36,#0d2f5f);
  color:#102033;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:12px;
}

.header{
  background:linear-gradient(135deg,#001f4d,#003b8f,#0057d9);
  color:white;
  padding:18px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.30);
  margin-bottom:12px;
}

.header h1{margin:0;font-size:21px;}
.header h2{margin:6px 0 0;font-size:15px;}
.header p{margin-top:6px;font-size:12px;}

.topo{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.info{
  flex:1;
  background:white;
  padding:10px;
  border-radius:14px;
  text-align:center;
  color:#003b8f;
  font-size:13px;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
}

.painel{
  background:white;
  border-radius:18px;
  padding:10px;
  margin-bottom:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.18);
}

.painel h3{
  margin:0 0 10px;
  text-align:center;
  color:#003b8f;
  font-size:13px;
}

.grade{
  display:flex;
  overflow-x:auto;
  gap:6px;
  padding-bottom:4px;
}

.btn-numero{
  min-width:42px;
  padding:8px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#001f4d,#003b8f,#0057d9);
  color:white;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-numero.ativo{
  outline:3px solid #ffd166;
}

.card{
  background:white;
  border-radius:24px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.22);
  min-height:540px;
}

.enunciado{
  font-size:15px;
  line-height:1.6;
  color:#002f6c;
  font-weight:bold;
  white-space:pre-line;
}

.alternativa{
  background:#f2f7ff;
  border:2px solid #bfd7ff;
  border-radius:16px;
  padding:14px;
  margin:10px 0;
  cursor:pointer;
  line-height:1.45;
  font-size:14px;
  font-weight:bold;
}

.correta{
  background:#d9ffd9!important;
  border-color:#17a317!important;
}

.errada{
  background:#ffdcdc!important;
  border-color:#d10000!important;
}

.resposta{
  display:none;
  margin-top:18px;
  background:#eef5ff;
  border-left:6px solid #003b8f;
  border-radius:14px;
  padding:15px;
  line-height:1.6;
  font-size:14px;
  white-space:pre-line;
}

.exibir .resposta{display:block;}

.botoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:18px;
}

button{
  background:linear-gradient(135deg,#001f4d,#003b8f,#0057d9);
  color:white;
  border:none;
  border-radius:14px;
  padding:12px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
}

.btn-largo{grid-column:span 2;}

.rodape{
  text-align:center;
  margin:14px 0 4px;
  color:white;
  font-size:12px;
  font-weight:bold;
}

@media print{
  body{background:white;}
  .header,.topo,.painel,.botoes,.rodape{display:none!important;}
  .app{max-width:100%;padding:0;}
  .card{
    box-shadow:none;
    border:1px solid #ccc;
    border-radius:10px;
    page-break-after:always;
    min-height:auto;
  }
  .com-resposta .resposta{display:block!important;}
  .sem-resposta .resposta{display:none!important;}
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>📱 CFC NA PALMA DA MÃO</h1>
  <h2>CPC 00 (R2)</h2>
  <p>Questões 01 a 10</p>
</div>

<div class="topo">
  <div class="info" id="score">0 / 10</div>
  <div class="info" id="contador">Questão 1</div>
</div>

<div class="painel">
  <h3>📌 Navegação Rápida</h3>
  <div class="grade" id="painelQuestoes"></div>
</div>

<div id="quiz"></div>

<div class="rodape">Curso de Contabilidade Professor Moreira</div>

</div>

<script>
const questoes = [

{
q:`01. Uma empresa alimentícia realiza entregas interestaduais por meio de um caminhão de carga. Em 10/12/2024, foi notificada porque o caminhão transportava mais do que o limite local permitido.

O prazo para pagamento da multa era de 30 dias e não havia possibilidade de recorrer. Ao elaborar a DRE de 2024, a empresa decidiu esperar até a finalização do prazo para pagamento da multa para reconhecer a despesa.

Ao analisar o fato, um perito constatou que não foi atendida a característica qualitativa da:`,
a:[
`(A) Neutralidade.`,
`(B) Tempestividade.`,
`(C) Continuidade.`,
`(D) Materialidade.`,
`(E) Compreensibilidade.`
],
c:1,
r:`✅ Gabarito: B

A despesa deveria ser reconhecida no momento adequado.

A empresa atrasou o reconhecimento, prejudicando a utilidade da informação.

Característica violada: tempestividade.`
},

{
q:`02. Um supermercado localizado no sul do país perdeu todo o estoque em maio de 2024, em razão de fortes chuvas.

Nas demonstrações mensais de 31/05/2024, o supermercado baixou todo o estoque, mesmo sem laudo oficial, para tornar as demonstrações mais úteis aos tomadores de decisão.

A informação apresenta a característica qualitativa da:`,
a:[
`(A) Neutralidade.`,
`(B) Materialidade.`,
`(C) Verificabilidade.`,
`(D) Tempestividade.`
],
c:3,
r:`✅ Gabarito: D

A baixa foi feita rapidamente para que a informação chegasse em tempo útil aos usuários.

Característica: tempestividade.`
},

{
q:`03. De acordo com a NBC TG Estrutura Conceitual, as demonstrações contábeis consolidadas fornecem informações sobre ativos, passivos, patrimônio líquido, receitas e despesas:`,
a:[
`(A) apenas das controladas.`,
`(B) apenas da controladora.`,
`(C) da controladora e de suas controladas, como entidades independentes.`,
`(D) da controladora e de suas controladas, como uma única entidade que reporta.`
],
c:3,
r:`✅ Gabarito: D

As demonstrações consolidadas apresentam a controladora e suas controladas como uma única entidade que reporta.`
},

{
q:`04. De acordo com a NBC TG Estrutura Conceitual, patrimônio líquido é a participação nos ativos da entidade após:`,
a:[
`(A) a dedução de seus passivos.`,
`(B) a dedução de suas despesas.`,
`(C) o acréscimo de suas receitas.`,
`(D) o acréscimo de seus passivos.`
],
c:0,
r:`✅ Gabarito: A

Patrimônio Líquido = Ativos - Passivos.`
},

{
q:`05. Segundo a NBC TG Estrutura Conceitual, para a representação dos relatórios financeiros ser fidedigna, ela precisa ser:`,
a:[
`(A) completa, neutra e isenta de erros.`,
`(B) confiável, tempestiva e com erros mínimos.`,
`(C) tempestiva, útil e comparável.`,
`(D) consistente, completa e compreensível.`
],
c:0,
r:`✅ Gabarito: A

Representação fidedigna exige:
✔ completa;
✔ neutra;
✔ isenta de erros.`
},

{
q:`06. A NBC TG Estrutura Conceitual descreve conceitos utilizados na elaboração de relatórios financeiros.

Relacione:

Elemento:
a. Despesa
b. Patrimônio Líquido
c. Receita

Definição:
I. Aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido.
II. Reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido.
III. Participação residual nos ativos da entidade após a dedução de todos os seus passivos.

Os elementos a, b e c correspondem, respectivamente, às definições:`,
a:[
`(A) II – III – I.`,
`(B) I – III – II.`,
`(C) II – I – III.`,
`(D) I – II – III.`
],
c:0,
r:`✅ Gabarito: A

Despesa → II.
Patrimônio Líquido → III.
Receita → I.`
},

{
q:`07. De acordo com a premissa da continuidade operacional, presume-se que a entidade não tem a intenção nem a necessidade de:`,
a:[
`(A) mudar a área ou o local de atuação.`,
`(B) entrar em liquidação ou deixar de negociar.`,
`(C) substituir suas estratégias financeiras ou operacionais.`,
`(D) deixar de publicar seus relatórios contábeis ou econômicos.`,
`(E) continuar operando por tempo indeterminado ou desconhecido.`
],
c:1,
r:`✅ Gabarito: B

Continuidade operacional presume que a entidade continuará operando.

Logo, presume-se que ela não tem intenção nem necessidade de entrar em liquidação ou deixar de negociar.`
},

{
q:`08. O objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta, úteis aos principais usuários na tomada de decisões.

Entre essas decisões está:`,
a:[
`(A) reter ou distribuir o resultado obtido.`,
`(B) expandir ou retrair os negócios perante uma crise.`,
`(C) aumentar ou manter o preço de venda dos produtos e serviços.`,
`(D) adotar estratégias agressivas ou conservadoras na gestão do capital circulante.`,
`(E) comprar, vender ou manter instrumento de patrimônio e de dívida.`
],
c:4,
r:`✅ Gabarito: E

Os principais usuários são investidores, credores por empréstimos e outros credores.

Eles usam os relatórios para decisões como comprar, vender ou manter instrumentos patrimoniais e de dívida.`
},

{
q:`09. De acordo com a NBC TG Estrutura Conceitual, um ativo, necessariamente:`,
a:[
`(A) é um bem corpóreo.`,
`(B) está atrelado a eventos futuros previsíveis.`,
`(C) tem o potencial de produzir benefícios econômicos.`,
`(D) representa um direito presente perante os acionistas.`,
`(E) foi adquirido pela entidade em uma transação com terceiros.`
],
c:2,
r:`✅ Gabarito: C

Ativo é um recurso econômico presente controlado pela entidade.

Recurso econômico é um direito que tem potencial de produzir benefícios econômicos.`
},

{
q:`10. De acordo com o CPC 00 (R2), o custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro.

Em relação a essa restrição, avalie as afirmativas a seguir e assinale V para verdadeira e F para falsa.

I. O relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelos benefícios de apresentar essas informações.

II. Os fornecedores de informações financeiras gastam a maior parte dos esforços envolvidos na coleta, processamento, verificação e disseminação de informações financeiras, mas, em última instância, os usuários arcam com esses custos na forma de retornos reduzidos.

III. Os usuários de informações financeiras podem incorrer em custos de análise e interpretação das informações fornecidas. Se as informações necessárias não são fornecidas, os usuários incorrem em custos de realizar a análise incompleta, sem as devidas informações.

A sequência correta é:`,
a:[
`(A) V – V – V.`,
`(B) V – V – F.`,
`(C) V – F – V.`,
`(D) F – V – V.`,
`(E) V – F – F.`
],
c:1,
r:`✅ Gabarito: B

I. Verdadeira.
Os relatórios impõem custos, que devem ser justificados pelos benefícios da informação.

II. Verdadeira.
Os fornecedores incorrem nos custos de produção da informação, mas os usuários acabam arcando indiretamente com esses custos.

III. Falsa.
A redação final está incorreta ao afirmar que, sem a informação, os usuários fazem análise incompleta “sem as devidas informações” como se isso fosse o tratamento adequado da restrição.

Sequência: V – V – F.`
}

];

let atual = 0;
let pontos = 0;
let respondidas = Array(questoes.length).fill(false);
let respostasAluno = Array(questoes.length).fill(null);

function carregarQuestao(){
  const q = questoes[atual];

  document.getElementById("contador").innerText = `Questão ${atual + 1}`;

  document.getElementById("quiz").innerHTML = `
    <div class="card" id="card">
      <div class="enunciado">${q.q}</div>

      ${q.a.map((alt,i)=>`
        <div class="alternativa" onclick="responder(${i})">${alt}</div>
      `).join("")}

      <div class="resposta">${q.r}</div>

      <div class="botoes">
        <button onclick="voltar()">⬅️ Voltar</button>
        <button onclick="proxima()">Próxima ➡️</button>
        <button onclick="mostrarResposta()" class="btn-largo">👁️ Mostrar Resposta</button>
        <button onclick="imprimirComResposta()">📄 Com Resposta</button>
        <button onclick="imprimirSemResposta()">📄 Sem Resposta</button>
        <button onclick="reiniciar()" class="btn-largo">🔄 Reiniciar</button>
      </div>
    </div>
  `;

  restaurarVisual();
  atualizarPainel();
}

function responder(i){
  if(respondidas[atual]) return;

  respondidas[atual] = true;
  respostasAluno[atual] = i;

  if(i === questoes[atual].c){
    pontos++;
  }

  marcarAlternativas();
  document.getElementById("card").classList.add("exibir");

  atualizarScore();
  atualizarPainel();
}

function marcarAlternativas(){
  const alternativas = document.querySelectorAll(".alternativa");

  alternativas.forEach((alt,index)=>{
    if(index === questoes[atual].c){
      alt.classList.add("correta");
    }

    if(index === respostasAluno[atual] && index !== questoes[atual].c){
      alt.classList.add("errada");
    }
  });
}

function restaurarVisual(){
  if(respondidas[atual]){
    marcarAlternativas();
    document.getElementById("card").classList.add("exibir");
  }
}

function atualizarScore(){
  document.getElementById("score").innerText = `${pontos} / ${questoes.length}`;
}

function atualizarPainel(){
  const painel = document.getElementById("painelQuestoes");
  painel.innerHTML = "";

  questoes.forEach((q,i)=>{
    let status = "⏳";

    if(respondidas[i]){
      status = respostasAluno[i] === questoes[i].c ? "✅" : "❌";
    }

    painel.innerHTML += `
      <button class="btn-numero ${i === atual ? 'ativo' : ''}" onclick="irPara(${i})">
        ${i + 1} ${status}
      </button>
    `;
  });
}

function irPara(i){
  atual = i;
  carregarQuestao();
}

function mostrarResposta(){
  document.getElementById("card").classList.add("exibir");
}

function proxima(){
  if(atual < questoes.length - 1){
    atual++;
    carregarQuestao();
  }
}

function voltar(){
  if(atual > 0){
    atual--;
    carregarQuestao();
  }
}

function reiniciar(){
  atual = 0;
  pontos = 0;
  respondidas = Array(questoes.length).fill(false);
  respostasAluno = Array(questoes.length).fill(null);
  atualizarScore();
  carregarQuestao();
}

function gerarTodas(){
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  questoes.forEach((q)=>{
    quiz.innerHTML += `
      <div class="card">
        <div class="enunciado">${q.q}</div>
        ${q.a.map(alt=>`<div class="alternativa">${alt}</div>`).join("")}
        <div class="resposta">${q.r}</div>
      </div>
    `;
  });
}

function imprimirComResposta(){
  document.body.classList.remove("sem-resposta");
  document.body.classList.add("com-resposta");
  gerarTodas();
  window.print();
  carregarQuestao();
}

function imprimirSemResposta(){
  document.body.classList.remove("com-resposta");
  document.body.classList.add("sem-resposta");
  gerarTodas();
  window.print();
  carregarQuestao();
}

carregarQuestao();
atualizarScore();
</script>

</body>
</html>
